
server.port=8081

# Configurações do Banco de Dados H2 em memooria
spring.datasource.url=jdbc:h2:mem:bibliotecadb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Ativa o Console do H2 no navegador para ver as tabelas
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Mostra no terminal os comandos SQL que o Spring gerar nos bastidores
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update
